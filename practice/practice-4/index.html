<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.fontcdn.ir/FontPersian/Vazirmatn/Vazirmatn-font-face.css">
    <title>aimi-t4</title>
    <style>
        *{
          margin:0;
         padding:0;
         box-sizing:border-box;
        }
        body{
          font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
          min-height:100vh;
          padding:20px;
         overflow-x:hidden;
         background:#05070d;
          color:white;
          position:relative;
        }
        body::before{
         content:"";
           position:fixed;
          inset:-30%;
          z-index:-2;
           background:
                radial-gradient(circle at 20% 30%,#2979ff55 0%,transparent 20%),
              radial-gradient(circle at 80% 20%,#00e5ff33 0%,transparent 18%),
              radial-gradient(circle at 50% 80%,#7c4dff44 0%,transparent 25%),
               radial-gradient(circle at 90% 90%,#0091ea22 0%,transparent 20%),
             linear-gradient(130deg,#05070d,#0d1324,#05070d);
         animation:bgMove 20s linear infinite alternate;
        }
        body::after{
          content:"";
         position:fixed;
         inset:0;
         z-index:-1;
          background-image:
             radial-gradient(white 1px,transparent 1px);
           background-size:40px 40px;
          opacity:.08;
          animation:stars 60s linear infinite;
        }
        @keyframes bgMove{
          0%{
                transform:translate(0,0) rotate(0deg);
          }
           100%{
               transform:translate(-5%,5%) rotate(10deg);
            }
        }
        @keyframes stars{
          from{
                transform:translateY(0);
          }
            to{
                transform:translateY(-40px);
         }
        }
        .header{
           display:flex;
         justify-content:space-between;
          align-items:center;
         padding:15px 20px;
         max-width:1200px;
          margin:0 auto 20px;
        }
        .logo{
          width:60px;
          filter:
                drop-shadow(0 0 10px #3d8bff)
             drop-shadow(0 0 20px #4f8cff);
        }
        .app-name{
          font-family:'Orbitron',sans-serif;
           font-size:32px;
          letter-spacing:5px;
           color:white;
         text-shadow:
             0 0 10px #2d8cff,
                0 0 20px #2979ff,
                0 0 40px #2979ff;
        }
        .container{
          max-width:1200px;
         margin:0 auto;
         display:grid;
         grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
         gap:20px;
         padding:20px;
        }
        .card{
          position:relative;
          background:rgba(255,255,255,.05);
         border:1px solid rgba(255,255,255,.08);
          backdrop-filter:blur(18px);
          border-radius:20px;
          padding:35px 25px;
          text-align:center;
          color:white;
          text-decoration:none;
          overflow:hidden;
          transition:.35s;
          box-shadow:
               0 10px 30px rgba(0,0,0,.4);
        }
        .card::before{
          content:"";
          position:absolute;
          top:-150%;
          left:-50%;
          width:60%;
          height:300%;
          background:linear-gradient(
               90deg,
              transparent,
              rgba(255,255,255,.15),
              transparent
          );
          transform:rotate(25deg);
          transition:.7s;
        }
        .card:hover::before{
         left:120%;
        }
        .card:hover{
          transform:translateY(-10px);
          border-color:#3d8bff;
          box-shadow:
               0 0 20px rgba(61,139,255,.4),
             0 0 40px rgba(61,139,255,.2),
             0 20px 40px rgba(0,0,0,.5);
        }
        .card-icon{
            font-size:70px;
         margin-bottom:15px;
          height:85px;
          display:flex;
          align-items:center;
          justify-content:center;
          filter:
              drop-shadow(0 0 10px #3d8bff);
        }
        .card-title{
           color:white;
          font-size:22px;
          font-weight:bold;
          letter-spacing:.5px;
        }
        .icon-note::before{content:"❌";}
        .icon-guitar::before{content:"1️⃣";}
        .icon-music::before{content:"2️⃣";}
        .icon-wave::before{content:"3️⃣";}
        .icon-metronome::before{content:"4️⃣";}
        .icon-score::before{content:"5️⃣";}
        @media(max-width:768px){
         .container{
        grid-template-columns:1fr;
        }
        .app-name{
        font-size:28px;
        }
        .logo{
        width:50px;
        }
        }
        @media(min-width:769px) and (max-width:1024px){
        .container{
        grid-template-columns:repeat(2,1fr);
        }
        }
         </style>
</head>
<body>
    <div class="header">
        <img src="logos/logo.png" alt="Logo" class="logo">
        <div class="app-name">تمرین چهارم</div>
    </div>
    <div class="container">
        <a href="exit.html" class="card">
            <div class="card-icon icon-note"></div>
            <div class="card-title">خروج</div>
        </a>
        <a href="1/index.html" class="card">
            <div class="card-icon icon-guitar"></div>
            <div class="card-title">practice 1</div>
        </a>
        <a href="2/index.html" class="card">
            <div class="card-icon icon-music"></div>
            <div class="card-title">practice 2</div>
        </a>
        <a href="3/index.html" class="card">
            <div class="card-icon icon-wave"></div>
            <div class="card-title">practice 3</div>
        </a>
        <a href="4/index.html" class="card">
            <div class="card-icon icon-metronome"></div>
            <div class="card-title">practice 4</div>
        </a>
        <a href="5/index.html" class="card">
            <div class="card-icon icon-score"></div>
            <div class="card-title">practice 5</div>
        </a>
    </div>
</body>
</html>
