<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #808080; /* خاکستری */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
